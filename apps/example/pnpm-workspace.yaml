# Example PNPM Workspace Configuration
# This demonstrates various catalog strategies and patterns

packages:
  - "packages/*"
  - "apps/*"

# Default catalog for most common dependencies
catalog:
  # Core frameworks
  react: ^19.2.4
  react-dom: ^19.2.4
  vue: ^3.5.30

  # TypeScript ecosystem
  typescript: ^5.9.3
  "@types/node": ^20.19.37
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3

  # Build tools
  vite: ^8.0.0
  webpack: ^5.105.4
  rollup: ^4.59.0
  "@vitejs/plugin-react": ^6.0.1
  "@rollup/plugin-node-resolve": ^16.0.3
  "@rollup/plugin-typescript": ^12.3.0
  tsx: ^4.21.0

  # Testing
  vitest: ^4.1.0
  jest: ^30.3.0
  "@testing-library/dom": ^10.4.1
  "@testing-library/react": ^16.3.2
  "@testing-library/jest-dom": ^6.9.1

  # Development tools
  eslint: ^10.0.3
  prettier: ^3.8.1

  # Utilities
  lodash: ^4.17.23
  axios: ^1.13.6
  chalk: ^5.6.2
  "@types/cors": ^2.8.19
  "@types/lodash": ^4.17.24

# Additional catalogs for different scenarios
catalogs:
  # Legacy React 17 support
  react17:
    react: ^17.0.2
    react-dom: ^17.0.2
    "@types/react": ^17.0.91
    "@types/react-dom": ^17.0.18
    "@testing-library/react": ^12.1.5

  # Latest/bleeding edge versions
  latest:
    react: ^19.2.4
    vue: ^3.5.30
    typescript: ^5.9.3
    vite: ^8.0.0
    vitest: ^4.1.0

  # Node.js specific versions
  node18:
    "@types/node": ^18.19.130

  node20:
    "@types/node": ^20.19.37

  # Development tools catalog
  devtools:
    eslint: ^10.0.3
    "@typescript-eslint/eslint-plugin": ^8.57.0
    "@typescript-eslint/parser": ^8.57.0
    prettier: ^3.8.1
    husky: ^9.1.7
    lint-staged: ^16.4.0

  # UI framework specific
  material-ui:
    "@mui/material": ^7.3.9
    "@mui/icons-material": ^7.3.9
    "@emotion/react": ^11.14.0
    "@emotion/styled": ^11.14.1

  # Server/API dependencies
  server:
    express: ^5.2.1
    fastify: ^5.8.2
    "@types/express": ^5.0.6
    cors: ^2.8.6
    helmet: ^8.1.0
