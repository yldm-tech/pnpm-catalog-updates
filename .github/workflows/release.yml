name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v1.2.3, etc.)
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type for manual runs'
        required: false
        default: 'current'
        type: choice
        options:
          - current
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (skip actual publish)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare_release:
    name: Prepare Release
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'current' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare version bump
        run: node scripts/release-prepare.cjs ${{ github.event.inputs.release_type }}

      - name: Get prepared version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/cli/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Prepared version: $VERSION"

      - name: Commit release changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git add apps/cli/package.json apps/cli/CHANGELOG.md
          git commit -m "chore: release v${{ steps.version.outputs.version }}"

      - name: Push release commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: git push origin HEAD:${{ github.ref_name }}

      - name: Create and push release tag
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          TAG_NAME="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "❌ Tag $TAG_NAME already exists"
            exit 1
          fi
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Summary
        run: |
          echo "## Release Preparation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Release type:** ${{ github.event.inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Prepared version:** v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "⚠️ **Dry run only**: no commit or tag was pushed." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Release commit and tag pushed.** The release job in this workflow will publish the packages." >> $GITHUB_STEP_SUMMARY
          fi

  release:
    name: Release
    needs: prepare_release
    if: >-
      ${{
        always() &&
        (
          github.event_name == 'push' ||
          github.event.inputs.release_type == 'current' ||
          (
            github.event_name == 'workflow_dispatch' &&
            github.event.inputs.release_type != 'current' &&
            github.event.inputs.dry_run != 'true' &&
            needs.prepare_release.result == 'success'
          )
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Manual minor/major/patch releases need the freshly pushed release commit,
          # because tag pushes created by GITHUB_TOKEN do not trigger a second workflow run.
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'current' && github.ref_name || github.ref }}

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./apps/cli/package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Verify version matches package.json
        run: |
          PACKAGE_VERSION=$(node -p "require('./apps/cli/package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"

          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "❌ Version mismatch!"
            echo "   Tag version: $TAG_VERSION"
            echo "   Package version: $PACKAGE_VERSION"
            exit 1
          fi
          echo "✅ Version verified: $PACKAGE_VERSION"

      - name: Build packages
        run: |
          echo "📦 Building packages..."
          pnpm --filter @pcu/utils build
          pnpm --filter @pcu/core build
          pnpm build

      - name: Run tests
        run: pnpm test

      - name: Publish to NPM
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "🚀 Publishing to NPM..."
          pnpm release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run publish
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "🧪 Dry run - skipping actual publish"
          node scripts/publish-dual.cjs --dry-run

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract changelog for this version
          CHANGELOG=$(awk "/^## ${VERSION}/,/^## [0-9]/" apps/cli/CHANGELOG.md | head -n -1 || echo "")

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG=$(cat <<EOF
          Release v${VERSION}

          See [CHANGELOG.md](https://github.com/yldm-tech/pnpm-catalog-updates/blob/main/apps/cli/CHANGELOG.md) for details.
          EOF
          )
          fi

          # Save to file for release body
          echo "$CHANGELOG" > /tmp/changelog.md
          echo "✅ Changelog extracted"

      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: /tmp/changelog.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Packages:** pcu, pnpm-catalog-updates" >> $GITHUB_STEP_SUMMARY
          echo "- **NPM:** https://www.npmjs.com/package/pcu" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "⚠️ **This was a dry run - no packages were published**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Published successfully!**" >> $GITHUB_STEP_SUMMARY
          fi
